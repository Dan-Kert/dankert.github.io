<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Kert | Визитка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background: #1a1a1a;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            padding: 3rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .social-link i {
            margin-right: 10px;
            font-size: 1.2em;
        }

        .social-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .telegram { background: #0088cc; }
        .instagram { background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d); }
        .tiktok { background: #000000; }
        .youtube { background: #ff0000; }

        .section {
            background: rgba(255,255,255,0.05);
            padding: 2.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .project-card {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .header {
                padding: 2rem 1rem;
            }
            .social-link {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="https://avatars.githubusercontent.com/u/ВАШ_ID" alt="Dan Kert" class="avatar">
            <h1>Dan Kert</h1>
            <p>Digital Creator & Developer</p>
            
            <div class="social-links">
                <a href="https://t.me/dan_kert" class="social-link telegram" target="_blank">
                    <i class="fab fa-telegram-plane"></i> Telegram
                </a>
                <a href="https://instagram.com/_dan_kert_" class="social-link instagram" target="_blank">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a href="https://tiktok.com/@dan_kert" class="social-link tiktok" target="_blank">
                    <i class="fab fa-tiktok"></i> TikTok
                </a>
                <a href="https://youtube.com/@dan_kert" class="social-link youtube" target="_blank">
                    <i class="fab fa-youtube"></i> YouTube
                </a>
            </div>
        </header>

        <section class="section">
            <h2>Обо мне</h2>
            <p>👨💻 Создаю контент о технологиях, программировании и digital-творчестве</p>
        </section>

        <section class="section">
            <h2>GitHub Проекты</h2>
            <div class="projects" id="projects">
                <!-- Проекты будут загружены через GitHub API -->
            </div>
        </section>
    </div>

    <footer>
        <p>© 2024 Dan Kert. Все права защищены</p>
    </footer>

    <script>
        // Загрузка проектов из GitHub API
        fetch('https://api.github.com/users/dan_kert/repos?sort=updated')
            .then(response => response.json())
            .then(data => {
                const projectsContainer = document.getElementById('projects');
                data.slice(0, 6).forEach(repo => {
                    projectsContainer.innerHTML += `
                        <div class="project-card">
                            <h3>${repo.name}</h3>
                            <p>${repo.description || 'Описание отсутствует'}</p>
                            <a href="${repo.html_url}" target="_blank" style="color: #4CAF50; text-decoration: none;">⟶ Исходный код</a>
                        </div>
                    `;
                });
            })
            .catch(error => console.error('Ошибка:', error));
    </script>
    <script src="https://kit.fontawesome.com/ВАШ_KIT_ID.js" crossorigin="anonymous"></script>
</body>
</html>
